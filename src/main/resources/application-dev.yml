spring.application:
  name: simplybyte-springboot
server:
  port: 6000
simplybyte:
  message: default-message-from-application

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/simplybyte
    username: root
    password: simplybyte
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
